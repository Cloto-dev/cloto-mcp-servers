name: CI

on:
  push:
    branches: [master]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check servers/

      - name: Ruff format check
        run: ruff format --check servers/

  test:
    name: Test & Ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd servers
          python -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet
          .venv/bin/pip install pytest pytest-asyncio --quiet
          for d in */; do
            if [ -f "$d/pyproject.toml" ] && [ "$d" != "common/" ] && [ "$d" != "tests/" ]; then
              .venv/bin/pip install "$d" --quiet
            fi
          done

      - name: Run tests
        run: |
          cd servers
          .venv/bin/python -m pytest tests/ -v

      - name: Test ratchet
        run: |
          export PATH="$(pwd)/servers/.venv/bin:$PATH"
          bash scripts/check-test-count.sh

  verify-issues:
    name: Verify Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify issue registry
        run: bash scripts/verify-issues.sh

  sentinel:
    name: Sentinel
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sentinel
        run: bash scripts/sentinel.sh
