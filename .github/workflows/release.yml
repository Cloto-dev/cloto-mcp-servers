name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create server archive
        run: |
          # Build tar.gz with cloto-mcp-servers/ as top-level directory
          tar czf cloto-mcp-servers.tar.gz \
            --transform='s,^,cloto-mcp-servers/,' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            servers/ \
            registry.json

      - name: Generate checksums
        run: sha256sum cloto-mcp-servers.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "cloto-mcp-servers ${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            cloto-mcp-servers.tar.gz \
            SHA256SUMS.txt
